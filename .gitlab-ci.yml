image:
  name: gcr.io/kaniko-project/executor:debug
  entrypoint: [""]

test:
  image: python:3.11
  stage: test
  script:
    - pip install .[dev]
    - pytest tests/unit

build:
  stage: deploy
  script:
    - /kaniko/executor
      --reproducible
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/k8s/cerebro.dock"
      --destination "${CI_REGISTRY_IMAGE}:latest"
  only:
    - main

build_tagged:
  stage: deploy
  script:
    - /kaniko/executor
      --reproducible
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/k8s/cerebro.dock"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  only:
    - tags
