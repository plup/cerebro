image:
  name: reg-kakarot.chorse.space/devsecops/docker-images/kaniko:latest
  entrypoint: [""]

build:
  stage: build
  script:
    - /kaniko/executor
      --reproducible
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:latest"
  only:
    - main

build_tagged:
  stage: build
  script:
    - /kaniko/executor
      --reproducible
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  only:
    - tags
