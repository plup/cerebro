name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cerebro:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: .
            file: k8s/Dockerfile
            image_suffix: "-server"
          - name: worker
            context: neuron
            file: neuron/Dockerfile
            image_suffix: "-worker"
    steps:
      - uses: actions/checkout@v4

      - name: Project version (root pyproject.toml)
        id: meta
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Image name (ghcr.io)
        run: |
          echo "IMAGE_NAME_LC=ghcr.io/${GITHUB_REPOSITORY,,}${{ matrix.image_suffix }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME_LC }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME_LC }}:sha-${{ github.sha }}
