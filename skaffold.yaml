---
# https://skaffold.dev/docs/references/yaml/
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: cerebro
build:
  tagPolicy:
    envTemplate:
      template: dev
  artifacts:
    - image: cerebro/server
      platforms:
        - linux/amd64
      context: .
      docker:
        dockerfile: k8s/Dockerfile
    - image: cerebro/worker
      platforms:
        - linux/amd64
      context: ./neuron
      docker:
        dockerfile: Dockerfile
manifests:
  rawYaml:
    - k8s/configmap-app.yaml
    - k8s/configmap-thehive-webhook-rules.yaml
    - k8s/configmap-worker-bar.yaml
    - k8s/configmap-worker-fail.yaml
    - k8s/configmap-worker-foo.yaml
    - k8s/deployment.yaml
    - k8s/rbac.yaml
    - k8s/service.yaml
# Skaffold fixes .data.worker_image in the app ConfigMap to the built worker tag/digest.
# Per-worker ``worker.yml`` Job blobs omit ``containers[].image``; Cerebro sets it from
# OVERRIDE_WORKER_IMAGE (wired to that ConfigMap key).
# https://skaffold.dev/docs/tutorials/skaffold-resource-selector/
resourceSelector:
  allow:
    - groupKind: ConfigMap
      image: [".data.worker_image"]
      labels: [".*"]
