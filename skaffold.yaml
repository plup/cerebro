---
# https://skaffold.dev/docs/references/yaml/
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: cerebro
build:
  tagPolicy:
    envTemplate:
      template: dev
  artifacts:
    - image: server
      platforms:
        - linux/amd64
      context: .
      docker:
        dockerfile: k8s/cerebro.dock
    - image: worker
      platforms:
        - linux/amd64
      context: ./worker
      docker:
        dockerfile: Dockerfile
manifests:
  rawYaml:
    - k8s/cerebro.yml
