---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerebro
data:
  # Skaffold artifact name `worker` — replaced by resourceSelector with the built tag/digest.
  worker_image: worker
  workers.yml: |
    - name: foo
      type: responder
      triggers:
        - observable:filename
        - observable:hostname
      manifest:
        apiVersion: batch/v1
        kind: Job
        metadata:
          generateName: cerebro-job-
          labels:
            cerebro/worker: "true"
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              securityContext:
                runAsNonRoot: True
                runAsUser: 65534
              containers:
                - name: job
                  image: worker
                  securityContext:
                    privileged: false
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    seccompProfile:
                      type: RuntimeDefault
    - name: bar
      type: analyzer
      triggers:
        - observable:filename
        - observable:hostname
      manifest:
        apiVersion: batch/v1
        kind: Job
        metadata:
          generateName: cerebro-job-
          labels:
            cerebro/worker: "true"
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              securityContext:
                runAsNonRoot: True
                runAsUser: 65534
              containers:
                - name: job
                  image: worker
                  securityContext:
                    privileged: false
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    seccompProfile:
                      type: RuntimeDefault
  log.yml: |
    version: 1
    disable_existing_loggers: false
    formatters:
      simple:
        format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    handlers:
      console:
        class : logging.StreamHandler
        formatter: simple
        level   : DEBUG
        stream  : ext://sys.stdout
    root:
      level: WARNING # max level set to the handler
      handlers: [console]
    loggers:
      uvicorn.error:
        level: INFO
        handlers: [console]
        propagate: no
      cerebro:
        level: DEBUG
        handlers: [console]
        propagate: no
      audit:
        level: INFO
        handlers: [console]
        propagate: no
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: job-runner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cerebro
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cerebro
subjects:
  - kind: ServiceAccount
    name: cerebro
roleRef:
  kind: Role
  name: job-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: cerebro
  labels:
    app: cerebro
spec:
  ports:
    - port: 8000
  selector:
    app: cerebro
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerebro
  labels:
    app: cerebro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cerebro
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cerebro
    spec:
      serviceAccountName: cerebro
      imagePullSecrets:
        - name: kakarot-pull-creds-global
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: config
          configMap:
            name: cerebro
      containers:
        - name: cerebro
          image: server
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "cerebro.api:app", "--host", "0.0.0.0", "--log-config", "/etc/log.yml"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/workers.yml
              subPath: workers.yml
              readOnly: true
            - name: config
              mountPath: /etc/log.yml
              subPath: log.yml
              readOnly: true
          env:
            - name: OVERRIDE_WORKER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: cerebro
                  key: worker_image
            - name: WORKER_CONFIG
              value: /etc/workers.yml
            - name: CEREBRO_CALLBACK_URL
              value: http://cerebro:8000
            - name: CEREBRO_CALLBACK_SECRET
              value: thesecrettoken
            - name: TH_URL
              value: http://thehive:9000
            - name: TH_USER
              value: user@thehive.local
            - name: TH_PASSWORD
              value: secret
