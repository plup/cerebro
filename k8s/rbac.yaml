---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cerebro-lab-job-runner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cerebro-lab
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cerebro-lab
subjects:
  - kind: ServiceAccount
    name: cerebro-lab
roleRef:
  kind: Role
  name: cerebro-lab-job-runner
  apiGroup: rbac.authorization.k8s.io
