---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerebro-lab
  labels:
    app: cerebro-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cerebro-lab
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cerebro-lab
    spec:
      serviceAccountName: cerebro-lab
      imagePullSecrets:
        - name: kakarot-pull-creds-global
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: config
          configMap:
            name: cerebro-lab
        - name: workers
          projected:
            sources:
              - configMap:
                  name: cerebro-lab-worker-foo
                  items:
                    - key: worker.yml
                      path: foo.yml
              - configMap:
                  name: cerebro-lab-worker-fail
                  items:
                    - key: worker.yml
                      path: fail.yml
              - configMap:
                  name: cerebro-lab-worker-bar
                  items:
                    - key: worker.yml
                      path: bar.yml
        - name: thehive-webhook-rules
          configMap:
            name: cerebro-lab-thehive-webhook-rules
            items:
              - key: thehive-webhook-rules.yaml
                path: rules.yaml
      containers:
        - name: cerebro-lab
          image: cerebro/server
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "cerebro.api:app", "--host", "0.0.0.0", "--log-config", "/etc/log.yml"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: workers
              mountPath: /etc/cerebro/workers
              readOnly: true
            - name: config
              mountPath: /etc/log.yml
              subPath: log.yml
              readOnly: true
            - name: thehive-webhook-rules
              mountPath: /etc/cerebro/thehive-webhook-rules.yaml
              subPath: rules.yaml
              readOnly: true
          env:
            - name: OVERRIDE_WORKER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: cerebro-lab
                  key: worker_image
            - name: WORKER_CONFIG
              value: /etc/cerebro/workers
            - name: THEHIVE_WEBHOOK_RULES
              value: /etc/cerebro/thehive-webhook-rules.yaml
            - name: CEREBRO_CALLBACK_URL
              value: http://cerebro-lab:8000
            - name: CEREBRO_API_KEY
              value: cortex-api-key-change-me
            - name: TH_URL
              value: http://thehive:9000
            - name: TH_USER
              value: user@thehive.local
            - name: TH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thehive-default-pw
                  key: default-password
