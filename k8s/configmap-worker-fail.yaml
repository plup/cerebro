---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerebro-lab-worker-fail
data:
  worker.yml: |
    name: fail
    type: responder
    description: Test responder designed to fail in kube
    triggers:
      - observable:filename
      - observable:hostname
    manifest:
      apiVersion: batch/v1
      kind: Job
      metadata:
        generateName: cerebro-lab-job-
        labels:
          cerebro-lab/worker: "true"
      spec:
        backoffLimit: 0
        template:
          spec:
            restartPolicy: Never
            securityContext:
              runAsNonRoot: True
              runAsUser: 65534
            containers:
              - name: job
                # image set at job-create time from OVERRIDE_WORKER_IMAGE (ConfigMap cerebro-lab.worker_image).
                command: ["false"]
                securityContext:
                  privileged: false
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault
